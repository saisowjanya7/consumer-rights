<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint Chatbot</title>
<link rel="stylesheet" href="stylechatbot.css">
</head>

<body>

<div class="container">
    <h1>Complaint Help Chatbot 🤖</h1>

    <!-- Language -->
    <select id="language">
        <option value="en">English</option>
        <option value="te">Telugu</option>
        <option value="hi">Hindi</option>
    </select>

    <br><br>

    <!-- Complaint -->
    <textarea id="complaint" placeholder="Describe your problem..."></textarea>

    <br><br>

    <!-- Camera + Upload -->
    <input type="file" accept="image/*" capture="environment">

    <br><br>

    <!-- Button -->
    <button onclick="analyzeComplaint()">Analyze Complaint</button>

    <br><br>

    <!-- Result -->
    <div id="result"></div>

    <!-- Action Area -->
    <div id="actionArea"></div>

    <br>

    <!-- Back -->
    <a href="basicrules.html" class="btn">⬅ Go Back</a>
</div>

<script src="script.js"></script>

</body>
</html>
